<!DOCTYPE html>
<html lang="pt_br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>

<body>
  <header class="header">
    <h1>Lista de Tarefas</h1>
  </header>

  <main class="mainContent">
    <h2>Tarefa</h2>
    <input id="tituloTarefa" placeholder="Insira o título da tarefa aqui" type="text">
    <input id="descricaoTarefa" placeholder="Insira a descrição da tarefa aqui" type="text">
    <label for="dataTarefa">Prazo final</label>
    <input type="date" id="dataTarefa">
    <button id="button">Inserir</button>
    <div id="line"></div>
    <button id="ordenar">Ordenar por data</button>
    <div id="tarefas"></div>
  </main>

  <script src="index.js"></script>
</body>

</html>
